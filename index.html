<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Estoque</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            background-color: black;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 300px; /* Garante um espaço visual antes da câmera carregar */
        }
        .controls { margin-top: 20px; width: 100%; max-width: 500px; display: flex; justify-content: space-between; }
        button {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        table {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <h2 style="color: #333;">Leitor de Produtos</h2>
    
    <div id="reader"></div>

    <div class="controls">
        <button onclick="exportarPlanilha()">📥 Baixar Planilha (CSV)</button>
    </div>

    <table id="tabela-resultados">
        <thead>
            <tr>
                <th>Código</th>
                <th>Produto</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela">
        </tbody>
    </table>

    <audio id="som-bipe" src="https://www.soundjay.com/buttons/sounds/beep-07a.mp3" preload="auto"></audio>

    <script>
        let dadosLidos = [];
        let codigosLidos = new Set(); // Usado para checar duplicidade rapidamente
        let leitorPausado = false;

        function tocarBipe() {
            const bipe = document.getElementById('som-bipe');
            bipe.currentTime = 0; 
            bipe.play();
        }

        function sucessoNaLeitura(textoDecodificado) {
            if (leitorPausado) return; 

            // Verificação de Duplicidade
            if (codigosLidos.has(textoDecodificado)) {
                leitorPausado = true;
                alert(`Atenção: O código ${textoDecodificado} já foi lido e está na lista!`);
                // Dá um pequeno tempo antes de liberar a leitura de novo para não travar a tela
                setTimeout(() => { leitorPausado = false; }, 1500);
                return;
            }

            leitorPausado = true;
            tocarBipe();

            setTimeout(() => {
                let nomeProduto = prompt(`Código lido: ${textoDecodificado}\nQual é o nome deste produto?`);
                
                if (nomeProduto && nomeProduto.trim() !== "") {
                    // Salva na memória e no Set de duplicidade
                    dadosLidos.push({ codigo: textoDecodificado, produto: nomeProduto });
                    codigosLidos.add(textoDecodificado); 
                    atualizarTabela();
                } else {
                    alert("Produto ignorado. Você não digitou um nome.");
                }
                
                // Libera a câmera para o próximo bipe
                leitorPausado = false;
            }, 200);
        }

        function erroNaLeitura(erro) {
            // Ignorado de propósito para manter o vídeo rodando liso
        }

        // Inicializa o leitor forçando a câmera traseira
        const html5QrCode = new Html5Qrcode("reader");
        
        // A configuração { facingMode: "environment" } força o uso da câmera de trás
        html5QrCode.start(
            { facingMode: "environment" }, 
            {
                fps: 10,    // Leituras por segundo
                qrbox: { width: 250, height: 150 } // Área de foco do leitor
            },
            sucessoNaLeitura,
            erroNaLeitura
        ).catch(err => {
            alert(`Erro ao iniciar a câmera traseira. Verifique as permissões. Detalhe: ${err}`);
        });

        // Atualiza a tabela na tela
        function atualizarTabela() {
            const tbody = document.getElementById('corpo-tabela');
            tbody.innerHTML = ''; 
            dadosLidos.forEach(item => {
                let linha = `<tr><td>${item.codigo}</td><td>${item.produto}</td></tr>`;
                tbody.innerHTML += linha;
            });
        }

        // Gera o arquivo CSV
        function exportarPlanilha() {
            if (dadosLidos.length === 0) {
                alert("Nenhum produto foi lido ainda para baixar a planilha!");
                return;
            }
            
            let conteudoCsv = "data:text/csv;charset=utf-8,\uFEFF"; 
            conteudoCsv += "Código;Produto\n"; 
            
            dadosLidos.forEach(function(linha) {
                let textoLinha = `${linha.codigo};"${linha.produto}"`; 
                conteudoCsv += textoLinha + "\n";
            });

            const uriCodificada = encodeURI(conteudoCsv);
            const link = document.createElement("a");
            link.setAttribute("href", uriCodificada);
            link.setAttribute("download", "estoque_produtos.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
